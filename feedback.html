<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>感想・要望 — Sanapelit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,600;1,9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#122036;
    --birch:#F6F1E7;
    --birch-dim:#E7DFCF;
    --frost:#9FBAD1;
    --radius:18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    background-image:
      radial-gradient(ellipse at 50% -10%, rgba(226,166,59,0.10), transparent 55%),
      radial-gradient(ellipse at 50% 120%, rgba(95,138,90,0.10), transparent 50%);
    color:var(--birch);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:40px 16px 60px;
  }
  .app{ width:100%; max-width:700px; }
  .back-link{
    display:inline-block;
    font-size:12.5px;
    color:var(--frost);
    text-decoration:none;
    margin-bottom:14px;
    opacity:0.85;
  }
  .back-link:hover{ opacity:1; text-decoration:underline; }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--frost);
    text-align:center;
    margin-bottom:4px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-optical-sizing:auto;
    font-weight:700;
    font-style:italic;
    font-size:clamp(28px,7vw,42px);
    text-align:center;
    margin:0 0 10px;
    letter-spacing:-0.01em;
  }
  .subtitle{
    text-align:center;
    color:var(--frost);
    font-size:14px;
    line-height:1.7;
    margin-bottom:32px;
  }
  .card{
    background:var(--birch);
    color:var(--ink);
    border-radius:var(--radius);
    padding:28px 24px;
  }
  .note{
    font-size:12.5px;
    color:#7a7461;
    text-align:center;
    margin-top:18px;
    line-height:1.6;
  }
</style>
</head>
<body>
<div class="app">
  <a class="back-link" href="index.html">← ほかの言語を見る</a>
  <div class="eyebrow">Sano mitä mieltä olet</div>
  <h1>感想・要望</h1>
  <div class="subtitle">
    「この単語おかしくない?」「こんな言語も欲しい」「ここが使いにくい」など、<br>
    気づいたことがあれば、なんでもコメントしてください。中の人が見てます。
  </div>

  <div class="card">
    <div id="disqus_thread"></div>
    <script>
        (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://sanapelit.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>コメントを表示するには<a href="https://disqus.com/?ref_noscript">JavaScriptを有効にしてください</a>。</noscript>
  </div>

  <div class="note">
    コメントの投稿にはDisqusのアカウント(またはメールアドレス)が必要です。<br>
    投稿された内容は、ほかの訪問者にも公開されます。
  </div>
</div>
</body>
</html>
