<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フィンランド語 神経衰弱 — Sanapelit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700&family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#122036;
    --birch:#F6F1E7;
    --birch-dim:#E7DFCF;
    --lingon:#C23B32;
    --moss:#5F8A5A;
    --ember:#E2A63B;
    --frost:#9FBAD1;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    background-image:
      radial-gradient(ellipse at 50% -10%, rgba(226,166,59,0.10), transparent 55%),
      radial-gradient(ellipse at 50% 120%, rgba(95,138,90,0.10), transparent 50%);
    color:var(--birch);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:28px 16px 60px;
  }
  .app{ width:100%; max-width:720px; }
  .back-link{
    display:inline-block;
    font-size:12.5px;
    color:var(--frost);
    text-decoration:none;
    margin-bottom:14px;
    opacity:0.85;
  }
  .back-link:hover{ opacity:1; text-decoration:underline; }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--frost);
    text-align:center;
    margin-bottom:4px;
  }
  h1{
    font-family:'Bricolage Grotesque',sans-serif;
    font-weight:700;
    font-size:clamp(28px,7vw,42px);
    text-align:center;
    margin:0 0 6px;
    letter-spacing:-0.01em;
  }
  .subtitle{
    text-align:center;
    color:var(--frost);
    font-size:14px;
    margin-bottom:24px;
    line-height:1.6;
  }
  .card-panel{
    background:var(--birch);
    color:var(--ink);
    border-radius:var(--radius);
    padding:28px 24px;
    margin-top:18px;
  }
  .hidden{ display:none !important; }

  .level-note{
    font-size:13px;
    color:#5b5648;
    background:var(--birch-dim);
    border-radius:10px;
    padding:10px 14px;
    margin-bottom:14px;
  }
  .cat-select-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    margin:6px 0 8px;
  }
  .link-btn{
    background:none;
    border:none;
    padding:0;
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    font-weight:600;
    color:var(--moss);
    cursor:pointer;
    text-decoration:underline;
  }
  .link-btn:hover{ opacity:0.75; }
  .cat-select-sep{ color:#b9b19a; font-size:12px; }
  .cat-grid-scroll{
    max-height:220px;
    overflow-y:auto;
    padding:10px;
    margin-bottom:16px;
    border:1px solid var(--birch-dim);
    border-radius:12px;
  }
  .cat-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  @media (max-width:420px){ .cat-grid{ grid-template-columns:1fr; } }
  .cat-chip{
    display:flex;
    align-items:center;
    gap:9px;
    background:var(--birch-dim);
    border:2px solid transparent;
    border-radius:12px;
    padding:11px 12px;
    cursor:pointer;
    font-weight:600;
    font-size:13.5px;
    user-select:none;
  }
  .cat-chip input{ accent-color:var(--moss); width:16px; height:16px; flex:none; }
  .cat-chip.active{ border-color:var(--moss); background:#EAF2E6; }
  .cat-count{ font-family:'JetBrains Mono',monospace; font-size:11px; color:#6b6656; margin-left:auto; }

  .size-row{
    display:flex;
    gap:8px;
    justify-content:center;
    margin-bottom:16px;
  }
  .size-btn{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:13px;
    background:var(--birch-dim);
    border:2px solid transparent;
    border-radius:10px;
    padding:9px 14px;
    cursor:pointer;
    color:var(--ink);
  }
  .size-btn.active{ border-color:var(--moss); background:#EAF2E6; }

  .btn{
    font-family:'Bricolage Grotesque',sans-serif;
    font-weight:700;
    font-size:15px;
    border:none;
    border-radius:12px;
    padding:14px 22px;
    cursor:pointer;
    width:100%;
    transition:transform .08s ease, filter .15s ease;
  }
  .btn:active{ transform:scale(0.98); }
  .btn-primary{ background:var(--ink); color:var(--birch); }
  .btn-primary:hover{ filter:brightness(1.2); }
  .btn-ghost{
    background:transparent;
    color:var(--frost);
    border:1px solid rgba(159,186,209,0.4);
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13px;
    padding:10px 16px;
  }
  .btn-ghost:hover{ background:rgba(159,186,209,0.1); }
  .inline-warning{ text-align:center; font-size:12.5px; color:var(--lingon); margin-top:8px; font-weight:600; }

  .game-meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--frost);
    padding:0 2px;
    margin-bottom:10px;
    gap:8px;
  }
  .quit-btn{
    font-family:'Inter',sans-serif;
    font-size:11.5px;
    font-weight:600;
    color:#a5443c;
    background:none;
    border:1px solid rgba(194,59,50,0.35);
    border-radius:8px;
    padding:5px 9px;
    cursor:pointer;
    flex:none;
  }
  .quit-btn:hover{ background:rgba(194,59,50,0.08); }

  .memory-grid{
    display:grid;
    gap:8px;
  }
  .memory-card{
    aspect-ratio:1 / 0.78;
    border-radius:10px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:6px;
    font-weight:700;
    position:relative;
    transition:transform .12s ease;
    user-select:none;
    background:var(--ink);
  }
  .memory-card .back-icon{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--frost);
    letter-spacing:0.08em;
  }
  .memory-card.flipped{ background:var(--birch-dim); }
  .memory-card.flipped.type-fi{ background:var(--birch); }
  .memory-card.flipped.type-ja{ background:#EAF2E6; }
  .memory-card .front-text{ display:none; font-size:13px; line-height:1.25; word-break:break-word; }
  .memory-card.flipped .back-icon{ display:none; }
  .memory-card.flipped .front-text{ display:block; }
  .memory-card.type-fi .front-text{ font-family:'Fraunces',serif; font-style:italic; font-weight:700; font-size:15px; color:var(--ink); }
  .memory-card.type-ja .front-text{ font-family:'Inter',sans-serif; font-weight:600; font-size:12px; color:#3d5a38; }
  .memory-card.matched{ opacity:0.35; cursor:default; pointer-events:none; }
  .memory-card.wrong{ animation:shake .3s; }
  @keyframes shake{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }

  .score-big{
    font-family:'Bricolage Grotesque',sans-serif;
    font-weight:700;
    font-size:44px;
    text-align:center;
    margin:2px 0 2px;
  }
  .score-label{
    text-align:center;
    color:#6b6656;
    font-size:13px;
    font-family:'JetBrains Mono',monospace;
    letter-spacing:0.06em;
    margin-bottom:20px;
  }
  .result-btns{ display:flex; gap:10px; margin-top:20px; }
  .result-btns .btn{ flex:1; }

  .history-panel{ margin-top:14px; border-top:1px solid var(--birch-dim); padding-top:14px; }
  .history-empty{ font-size:13px; color:#7a7461; text-align:center; padding:10px 0; }
  .history-summary{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
  .summary-stat{ background:var(--birch-dim); border-radius:10px; padding:12px 6px; text-align:center; }
  .summary-num{ font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:20px; color:var(--ink); }
  .summary-label{ font-size:10.5px; color:#7a7461; margin-top:2px; }
  .history-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 4px; border-bottom:1px solid var(--birch-dim); font-size:13px; }
  .history-row:last-child{ border-bottom:none; }
  .history-date{ font-family:'JetBrains Mono',monospace; font-size:11.5px; color:#7a7461; flex:none; width:100px; }
  .history-clear{ display:block; margin:12px auto 0; background:none; border:none; color:var(--lingon); font-size:12px; cursor:pointer; text-decoration:underline; }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,16,28,0.6);
    display:flex; align-items:center; justify-content:center; padding:20px; z-index:1000;
  }
  .modal-box{ background:var(--birch); color:var(--ink); border-radius:16px; padding:24px 22px; width:100%; max-width:340px; }
  .modal-message{ font-size:15px; font-weight:600; text-align:center; margin-bottom:18px; line-height:1.5; }
  .modal-btns{ display:flex; gap:10px; }
  .modal-btns .btn{ flex:1; }

  .changelog{
    margin-top:18px; padding:18px 20px;
    background:rgba(246,241,231,0.06);
    border:1px solid rgba(159,186,209,0.18);
    border-radius:14px;
  }
  .changelog-title{ font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--frost); margin-bottom:10px; }
  .changelog-list{ list-style:none; margin:0; padding:0; }
  .changelog-list li{ display:flex; gap:10px; font-size:12.5px; color:var(--birch); opacity:0.85; padding:5px 0; border-bottom:1px solid rgba(159,186,209,0.12); line-height:1.5; }
  .changelog-list li:last-child{ border-bottom:none; }
  .changelog-date{ font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--ember); flex:none; white-space:nowrap; }
  .feedback-link-row{ text-align:center; font-size:12.5px; color:var(--frost); margin-top:14px; }
  .feedback-link-row a{ color:var(--ember); text-decoration:underline; }
</style>
</head>
<body>
<div class="app">
  <a class="back-link" href="index.html">← ほかの言語を見る</a>
  <div class="eyebrow">MUISTIPELI</div>
  <h1>フィンランド語 神経衰弱</h1>
  <div class="subtitle">フィンランド語のカードと、日本語の意味のカードをめくって、同じペアを探しましょう。</div>

  <!-- START SCREEN -->
  <div class="card-panel" id="startScreen">
    <div class="level-note">レベル：初心者向け（4択クイズと同じ単語データを使っています）</div>
    <div class="cat-select-row">
      <button type="button" class="link-btn" id="selectAllBtn">すべて選択</button>
      <span class="cat-select-sep">・</span>
      <button type="button" class="link-btn" id="deselectAllBtn">選択を解除</button>
    </div>
    <div class="cat-grid-scroll"><div class="cat-grid" id="catGrid"></div></div>

    <div style="text-align:center; font-size:12.5px; color:#6b6656; margin-bottom:8px;">ペア数を選ぶ</div>
    <div class="size-row" id="sizeRow">
      <button type="button" class="size-btn" data-size="6">6ペア</button>
      <button type="button" class="size-btn active" data-size="8">8ペア</button>
      <button type="button" class="size-btn" data-size="10">10ペア</button>
      <button type="button" class="size-btn" data-size="12">12ペア</button>
    </div>

    <button class="btn btn-primary" id="startBtn">はじめる</button>
    <div class="inline-warning hidden" id="startWarning">少なくとも1つカテゴリーを選んでください</div>
    <button class="btn btn-ghost" id="historyToggleBtn" style="margin-top:10px;">記録を見る</button>
    <div id="historyPanel" class="history-panel hidden"></div>
  </div>

  <!-- GAME SCREEN -->
  <div class="card-panel hidden" id="gameScreen">
    <div class="game-meta">
      <span id="movesCount">手数 0</span>
      <span id="timeCount">経過 0:00</span>
      <button class="quit-btn" id="quitBtn" type="button">✕ やめる</button>
    </div>
    <div class="memory-grid" id="memoryGrid"></div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="card-panel hidden" id="resultScreen">
    <div class="score-big" id="scoreBig">18手・1:24</div>
    <div class="score-label" id="scoreLabel">クリア！</div>
    <div class="result-btns">
      <button class="btn btn-ghost" id="backBtn">カテゴリーを選び直す</button>
      <button class="btn btn-primary" id="retryBtn">もう一度</button>
    </div>
  </div>

  <div class="changelog">
    <div class="changelog-title">📝 更新履歴</div>
    <ul class="changelog-list">
      <li><span class="changelog-date">2026-07-18</span><span>フィンランド語 神経衰弱を公開</span></li>
    </ul>
  </div>

  <div class="feedback-link-row">
    感想・要望は<a href="feedback.html">こちら</a>から気軽にどうぞ
  </div>
</div>

<div class="modal-overlay hidden" id="confirmOverlay">
  <div class="modal-box">
    <div class="modal-message" id="confirmMessage">やめますか？</div>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="confirmCancelBtn">キャンセル</button>
      <button class="btn btn-primary" id="confirmOkBtn">中断する</button>
    </div>
  </div>
</div>

  const CAT_LABELS = {"tervehdykset": "挨拶", "numerot": "数字", "värit": "色", "eläimet": "動物", "ruoka": "食べ物", "perhe": "家族", "yleiset sanat": "日常語", "vuodenajat": "季節", "kuukaudet": "月", "viikonpäivät": "曜日", "sää": "天気", "keho": "体", "vaatteet": "服", "koti": "家・部屋", "ammatit": "職業", "verbit": "動詞", "adjektiivit": "形容詞", "luonto": "自然", "liikenne": "乗り物", "tunteet": "感情", "aika": "時間", "kysymyssanat": "疑問詞", "hedelmät ja vihannekset": "果物・野菜", "juomat": "飲み物", "koulu": "学校", "urheilu": "スポーツ", "teknologia": "テクノロジー", "keittiövälineet": "台所用品", "paikat": "場所", "suunnat": "方向・位置", "työkalut": "道具", "musiikki ja viihde": "音楽・娯楽", "raha ja ostokset": "お金・買い物", "terveys": "健康", "adverbit": "副詞", "konjunktiot": "接続詞", "hyönteiset ja meren eläimet": "昆虫・海の生き物", "kasvit ja kukat": "植物・花", "toimistotarvikkeet": "文房具", "matka": "旅行", "sosiaaliset tilanteet": "社会的な場面", "maat": "国名", "ilmaisut": "表現"};
  const CAT_ORDER = Object.keys(CAT_LABELS);

  const els = {
    startScreen: document.getElementById('startScreen'),
    gameScreen: document.getElementById('gameScreen'),
    resultScreen: document.getElementById('resultScreen'),
    catGrid: document.getElementById('catGrid'),
    sizeRow: document.getElementById('sizeRow'),
    startBtn: document.getElementById('startBtn'),
    startWarning: document.getElementById('startWarning'),
    selectAllBtn: document.getElementById('selectAllBtn'),
    deselectAllBtn: document.getElementById('deselectAllBtn'),
    movesCount: document.getElementById('movesCount'),
    timeCount: document.getElementById('timeCount'),
    quitBtn: document.getElementById('quitBtn'),
    memoryGrid: document.getElementById('memoryGrid'),
    scoreBig: document.getElementById('scoreBig'),
    scoreLabel: document.getElementById('scoreLabel'),
    backBtn: document.getElementById('backBtn'),
    retryBtn: document.getElementById('retryBtn'),
    historyToggleBtn: document.getElementById('historyToggleBtn'),
    historyPanel: document.getElementById('historyPanel'),
    confirmOverlay: document.getElementById('confirmOverlay'),
    confirmMessage: document.getElementById('confirmMessage'),
    confirmCancelBtn: document.getElementById('confirmCancelBtn'),
    confirmOkBtn: document.getElementById('confirmOkBtn'),
  };

  let selectedCats = new Set(CAT_ORDER);
  let roundSize = 8;
  let deck = [];          // array of {key, type: 'fi'|'ja', text, matched}
  let firstPick = null;
  let secondPick = null;
  let locked = false;
  let moves = 0;
  let matchedPairs = 0;
  let totalPairs = 0;
  let timerInterval = null;
  let startTime = null;
  let roundActive = false;

  const HISTORY_KEY = 'memory-history-log-fi';
  const TOTALS_KEY = 'memory-totals-fi';
  const MAX_HISTORY = 50;

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function buildCatGrid(){
    els.catGrid.innerHTML = '';
    CAT_ORDER.forEach(key => {
      const label = CAT_LABELS[key];
      const count = WORDS.filter(w => w.cat === key).length;
      const chip = document.createElement('label');
      chip.className = 'cat-chip active';
      chip.innerHTML = `<input type="checkbox" checked data-cat="${key}"> ${label} <span class="cat-count">${count}</span>`;
      const input = chip.querySelector('input');
      input.addEventListener('change', () => {
        if(input.checked){ selectedCats.add(key); chip.classList.add('active'); }
        else { selectedCats.delete(key); chip.classList.remove('active'); }
      });
      els.catGrid.appendChild(chip);
    });
  }

  function setAllCategories(checked){
    const inputs = els.catGrid.querySelectorAll('input[type="checkbox"]');
    inputs.forEach(input => {
      input.checked = checked;
      const key = input.dataset.cat;
      const chip = input.closest('.cat-chip');
      if(checked){ selectedCats.add(key); chip.classList.add('active'); }
      else { selectedCats.delete(key); chip.classList.remove('active'); }
    });
  }

  els.sizeRow.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      els.sizeRow.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      roundSize = parseInt(btn.dataset.size, 10);
    });
  });

  function showScreen(name){
    els.startScreen.classList.toggle('hidden', name!=='start');
    els.gameScreen.classList.toggle('hidden', name!=='game');
    els.resultScreen.classList.toggle('hidden', name!=='result');
  }

  function formatTime(sec){
    const m = Math.floor(sec/60);
    const s = sec%60;
    return `${m}:${String(s).padStart(2,'0')}`;
  }

  function startRound(){
    const pool = WORDS.filter(w => selectedCats.has(w.cat));
    const picked = shuffle(pool).slice(0, roundSize);
    totalPairs = picked.length;
    matchedPairs = 0;
    moves = 0;
    firstPick = null; secondPick = null; locked = false;
    els.movesCount.textContent = '手数 0';
    els.timeCount.textContent = '経過 0:00';

    let cards = [];
    picked.forEach((w, idx) => {
      cards.push({key: idx, type: 'fi', text: w.fi, matched: false});
      cards.push({key: idx, type: 'ja', text: w.ja, matched: false});
    });
    deck = shuffle(cards);

    renderGrid();
    showScreen('game');
    roundActive = true;

    startTime = Date.now();
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      const sec = Math.floor((Date.now()-startTime)/1000);
      els.timeCount.textContent = '経過 ' + formatTime(sec);
    }, 1000);

    // grid columns based on round size for a reasonably square layout
    const cols = roundSize <= 6 ? 4 : (roundSize <= 8 ? 4 : (roundSize <= 10 ? 5 : 6));
    els.memoryGrid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  }

  function renderGrid(){
    els.memoryGrid.innerHTML = '';
    deck.forEach((card, idx) => {
      const div = document.createElement('div');
      div.className = 'memory-card';
      div.dataset.idx = idx;
      div.innerHTML = `<span class="back-icon">FI/JA</span><span class="front-text"></span>`;
      div.addEventListener('click', () => onCardClick(idx));
      els.memoryGrid.appendChild(div);
    });
  }

  function onCardClick(idx){
    if(locked) return;
    const card = deck[idx];
    if(card.matched) return;
    if(firstPick !== null && firstPick.idx === idx) return;
    if(secondPick !== null) return;

    const el = els.memoryGrid.children[idx];
    el.classList.add('flipped', 'type-' + card.type);
    el.querySelector('.front-text').textContent = card.text;

    if(firstPick === null){
      firstPick = {idx, card};
      return;
    }

    secondPick = {idx, card};
    moves++;
    els.movesCount.textContent = '手数 ' + moves;

    const isMatch = firstPick.card.key === secondPick.card.key && firstPick.card.type !== secondPick.card.type;

    if(isMatch){
      deck[firstPick.idx].matched = true;
      deck[secondPick.idx].matched = true;
      els.memoryGrid.children[firstPick.idx].classList.add('matched');
      els.memoryGrid.children[secondPick.idx].classList.add('matched');
      matchedPairs++;
      firstPick = null; secondPick = null;
      if(matchedPairs === totalPairs){
        locked = true;
        setTimeout(finishRound, 400);
      }
    } else {
      locked = true;
      el.classList.add('wrong');
      els.memoryGrid.children[firstPick.idx].classList.add('wrong');
      setTimeout(() => {
        els.memoryGrid.children[firstPick.idx].classList.remove('flipped','type-fi','type-ja','wrong');
        els.memoryGrid.children[firstPick.idx].querySelector('.front-text').textContent = '';
        els.memoryGrid.children[secondPick.idx].classList.remove('flipped','type-fi','type-ja','wrong');
        els.memoryGrid.children[secondPick.idx].querySelector('.front-text').textContent = '';
        firstPick = null; secondPick = null;
        locked = false;
      }, 750);
    }
  }

  function getTotals(){
    try{
      const raw = localStorage.getItem(TOTALS_KEY);
      const parsed = raw ? JSON.parse(raw) : null;
      if(parsed) return { plays: parsed.plays||0, bestMoves: parsed.bestMoves||null, bestTime: parsed.bestTime||null };
    }catch(e){}
    return { plays:0, bestMoves:null, bestTime:null };
  }
  function updateTotals(movesVal, timeVal){
    try{
      const t = getTotals();
      t.plays += 1;
      if(t.bestMoves === null || movesVal < t.bestMoves) t.bestMoves = movesVal;
      if(t.bestTime === null || timeVal < t.bestTime) t.bestTime = timeVal;
      localStorage.setItem(TOTALS_KEY, JSON.stringify(t));
    }catch(e){ console.error('累計記録の保存に失敗しました', e); }
  }
  async function getHistory(){
    try{
      const raw = localStorage.getItem(HISTORY_KEY);
      const parsed = raw ? JSON.parse(raw) : [];
      return Array.isArray(parsed) ? parsed : [];
    }catch(e){ return []; }
  }
  async function addHistoryEntry(entry){
    try{
      const current = await getHistory();
      const updated = [entry, ...current].slice(0, MAX_HISTORY);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(updated));
    }catch(e){ console.error('履歴の保存に失敗しました', e); }
  }
  async function clearHistory(){
    try{ localStorage.removeItem(HISTORY_KEY); localStorage.removeItem(TOTALS_KEY); }catch(e){}
  }
  function formatDate(iso){
    const d = new Date(iso);
    return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function finishRound(){
    roundActive = false;
    clearInterval(timerInterval);
    const elapsed = Math.floor((Date.now()-startTime)/1000);
    showScreen('result');
    els.scoreBig.textContent = `${moves}手 ・ ${formatTime(elapsed)}`;
    const efficiency = totalPairs / moves;
    let label = '';
    if(efficiency >= 0.9) label = '完璧に近い手数！';
    else if(efficiency >= 0.6) label = 'いい感じ！';
    else label = 'クリア！次はもっと少ない手数を目指そう';
    els.scoreLabel.textContent = label;

    updateTotals(moves, elapsed);
    addHistoryEntry({
      date: new Date().toISOString(),
      moves: moves,
      time: elapsed,
      pairs: totalPairs,
      categories: Array.from(selectedCats),
    });
  }

  function renderHistoryList(logs){
    els.historyPanel.innerHTML = '';
    if(!logs.length){
      const empty = document.createElement('div');
      empty.className = 'history-empty';
      empty.textContent = 'まだ記録がありません。1回プレイすると、ここに履歴が残ります。';
      els.historyPanel.appendChild(empty);
      return;
    }
    const totals = getTotals();
    const summary = document.createElement('div');
    summary.className = 'history-summary';
    summary.innerHTML = `
      <div class="summary-stat"><div class="summary-num">${totals.plays}</div><div class="summary-label">プレイ回数</div></div>
      <div class="summary-stat"><div class="summary-num">${totals.bestMoves ?? '-'}</div><div class="summary-label">最少手数</div></div>
      <div class="summary-stat"><div class="summary-num">${totals.bestTime !== null ? formatTime(totals.bestTime) : '-'}</div><div class="summary-label">最速タイム</div></div>
    `;
    els.historyPanel.appendChild(summary);

    logs.forEach(entry => {
      const row = document.createElement('div');
      row.className = 'history-row';
      row.innerHTML = `<span class="history-date">${formatDate(entry.date)}</span><span style="flex:1;color:#5b5648;">${entry.pairs}ペア</span><span style="font-family:'JetBrains Mono',monospace;font-weight:700;">${entry.moves}手・${formatTime(entry.time)}</span>`;
      els.historyPanel.appendChild(row);
    });

    const clearBtn = document.createElement('button');
    clearBtn.className = 'history-clear';
    clearBtn.textContent = '記録を消去する';
    clearBtn.addEventListener('click', async () => { clearBtn.disabled = true; await clearHistory(); renderHistoryList([]); });
    els.historyPanel.appendChild(clearBtn);
  }

  async function toggleHistoryPanel(){
    const isHidden = els.historyPanel.classList.contains('hidden');
    if(isHidden){
      els.historyPanel.classList.remove('hidden');
      els.historyPanel.innerHTML = '<div class="history-empty">読み込み中…</div>';
      const logs = await getHistory();
      renderHistoryList(logs);
      els.historyToggleBtn.textContent = '記録を隠す';
    } else {
      els.historyPanel.classList.add('hidden');
      els.historyToggleBtn.textContent = '記録を見る';
    }
  }

  function showConfirmModal(message, onConfirm){
    els.confirmMessage.textContent = message;
    els.confirmOverlay.classList.remove('hidden');
    function cleanup(){
      els.confirmOverlay.classList.add('hidden');
      els.confirmOkBtn.removeEventListener('click', onOk);
      els.confirmCancelBtn.removeEventListener('click', onCancel);
    }
    function onOk(){ cleanup(); onConfirm(); }
    function onCancel(){ cleanup(); }
    els.confirmOkBtn.addEventListener('click', onOk);
    els.confirmCancelBtn.addEventListener('click', onCancel);
  }

  buildCatGrid();
  els.selectAllBtn.addEventListener('click', () => setAllCategories(true));
  els.deselectAllBtn.addEventListener('click', () => setAllCategories(false));
  els.startBtn.addEventListener('click', () => {
    if(selectedCats.size === 0){ els.startWarning.classList.remove('hidden'); return; }
    const poolSize = WORDS.filter(w => selectedCats.has(w.cat)).length;
    if(poolSize < roundSize){
      els.startWarning.textContent = `選んだカテゴリーの単語数（${poolSize}語）がペア数より少ないです`;
      els.startWarning.classList.remove('hidden');
      return;
    }
    els.startWarning.classList.add('hidden');
    startRound();
  });
  els.retryBtn.addEventListener('click', startRound);
  els.backBtn.addEventListener('click', () => showScreen('start'));
  els.historyToggleBtn.addEventListener('click', toggleHistoryPanel);
  els.quitBtn.addEventListener('click', () => {
    showConfirmModal('神経衰弱を中断しますか？この回の記録は保存されません。', () => {
      roundActive = false;
      clearInterval(timerInterval);
      showScreen('start');
    });
  });

  showScreen('start');
})();
</script>
</body>
</html>
